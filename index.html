
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.app{max-width:420px;margin:0 auto;padding:0 0 80px}
.header{padding:20px 16px 12px;border-bottom:0.5px solid var(--color-border-tertiary)}
.header h1{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.header p{font-size:13px;color:var(--color-text-secondary);margin-top:2px}
.tabs{display:flex;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);position:sticky;top:0;z-index:10}
.tab{flex:1;padding:10px 4px;font-size:12px;background:none;border:none;border-bottom:2px solid transparent;color:var(--color-text-secondary);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.tab.active{border-bottom-color:#7F77DD;color:#534AB7}
.tab i{font-size:18px}
.section{display:none;padding:16px}
.section.active{display:block}

.day-block{margin-bottom:20px}
.day-label{font-size:11px;font-weight:500;color:#534AB7;background:#EEEDFE;padding:4px 10px;border-radius:20px;display:inline-block;margin-bottom:10px}
.timeline-item{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start}
.time-col{min-width:44px;font-size:12px;color:var(--color-text-secondary);padding-top:10px}
.timeline-card{flex:1;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px}
.timeline-card input{width:100%;border:none;background:transparent;font-size:14px;color:var(--color-text-primary);outline:none}
.timeline-card input::placeholder{color:var(--color-text-tertiary)}
.timeline-card .memo{font-size:12px;color:var(--color-text-secondary);border-top:0.5px solid var(--color-border-tertiary);margin-top:6px;padding-top:6px}
.timeline-card .memo input{font-size:12px;color:var(--color-text-secondary)}
.add-btn{width:100%;padding:10px;border:0.5px dashed var(--color-border-secondary);border-radius:var(--border-radius-md);background:none;color:var(--color-text-secondary);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px}
.add-btn:hover{background:var(--color-background-secondary)}

.cat-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:14px;scrollbar-width:none}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-btn{padding:6px 12px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:none;font-size:12px;color:var(--color-text-secondary);cursor:pointer;white-space:nowrap}
.cat-btn.active{background:#EEEDFE;border-color:#AFA9EC;color:#3C3489}
.wish-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.wish-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;position:relative}
.wish-img{width:100%;height:110px;object-fit:cover;background:var(--color-background-secondary);display:flex;align-items:center;justify-content:center;font-size:30px}
.wish-img-placeholder{width:100%;height:110px;background:var(--color-background-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer}
.wish-img-placeholder i{font-size:28px;color:var(--color-text-tertiary)}
.wish-body{padding:8px 10px}
.wish-name{font-size:13px;font-weight:500;color:var(--color-text-primary);border:none;background:transparent;width:100%;outline:none}
.wish-price{font-size:12px;color:var(--color-text-secondary);border:none;background:transparent;width:100%;outline:none;margin-top:2px}
.wish-delete{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,0.4);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px}
.wish-check{position:absolute;top:6px;left:6px;width:22px;height:22px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.8);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.wish-check.done{background:#7F77DD;border-color:#7F77DD}
.add-wish-btn{background:var(--color-background-secondary);border:0.5px dashed var(--color-border-secondary);border-radius:var(--border-radius-lg);height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;color:var(--color-text-secondary);font-size:12px}
.add-wish-btn i{font-size:28px}

.shop-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:12px;margin-bottom:8px;display:flex;gap:10px;align-items:center}
.shop-icon{width:40px;height:40px;border-radius:var(--border-radius-md);background:#EEEDFE;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.shop-icon i{font-size:20px;color:#534AB7}
.shop-info{flex:1;min-width:0}
.shop-info input{width:100%;border:none;background:transparent;outline:none;font-size:14px;color:var(--color-text-primary)}
.shop-info input.sub{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
.shop-done{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--color-border-secondary);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.shop-done.done{background:#7F77DD;border-color:#7F77DD;color:#fff}

.check-section{margin-bottom:20px}
.check-label{font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em}
.check-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.check-item:last-child{border-bottom:none}
.checkbox{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--color-border-secondary);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.checkbox.done{background:#7F77DD;border-color:#7F77DD}
.check-text{flex:1;font-size:14px;color:var(--color-text-primary)}
.check-text.done{text-decoration:line-through;color:var(--color-text-tertiary)}

input[type=file]{display:none}
</style>

<div class="app">
  <div class="header">
    <h1>✈️ 韓国旅行 2025</h1>
    <p>6月20日（金）〜 6月22日（日）· 2泊3日</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('schedule',this)"><i class="ti ti-calendar" aria-hidden="true"></i>日程</button>
    <button class="tab" onclick="switchTab('wish',this)"><i class="ti ti-shopping-bag" aria-hidden="true"></i>買いもの</button>
    <button class="tab" onclick="switchTab('shops',this)"><i class="ti ti-map-pin" aria-hidden="true"></i>お店</button>
    <button class="tab" onclick="switchTab('pack',this)"><i class="ti ti-briefcase" aria-hidden="true"></i>持ちもの</button>
  </div>

  <div id="tab-schedule" class="section active">
    <div id="days-container"></div>
  </div>

  <div id="tab-wish" class="section">
    <div class="cat-tabs" id="cat-tabs"></div>
    <div class="wish-grid" id="wish-grid"></div>
    <input type="file" id="img-input" accept="image/*">
  </div>

  <div id="tab-shops" class="section">
    <div id="shops-list"></div>
    <button class="add-btn" onclick="addShop()"><i class="ti ti-plus" aria-hidden="true"></i>お店を追加</button>
  </div>

  <div id="tab-pack" class="section">
    <div id="pack-list"></div>
  </div>
</div>

<script>
const DAYS = [
  {label:"Day 1 · 6月20日（金）",slots:[{t:"移動",p:"フライト・空港到着"},{t:"昼",p:""},{t:"午後",p:""},{t:"夜",p:""}]},
  {label:"Day 2 · 6月21日（土）",slots:[{t:"午前",p:""},{t:"昼",p:""},{t:"午後",p:""},{t:"夜",p:""}]},
  {label:"Day 3 · 6月22日（日）",slots:[{t:"午前",p:""},{t:"昼",p:""},{t:"移動",p:"空港・帰国"}]}
];

const CATS = ["コスメ・スキンケア","ファッション","グッズ・雑貨","食べもの・お菓子"];
let currentCat = CATS[0];
let wishes = {};
CATS.forEach(c => wishes[c] = []);

let shops = [{name:"行きたいカフェ",memo:"エリアメモ"},{name:"ショッピングモール",memo:""}];
let pendingWishCat = null;

const PACK = {
  "パスポート・書類":["パスポート","航空券（印刷/アプリ）","ホテル予約確認書","旅行保険証書","現金（ウォン）"],
  "ガジェット":["充電器","モバイルバッテリー","変換プラグ（Aタイプ）","イヤホン","カメラ"],
  "服・アクセサリー":["着替え（3日分）","パジャマ","下着","羽織り物","サングラス"],
  "コスメ・衛生用品":["日焼け止め","スキンケア","メイク道具","歯ブラシ","常備薬"]
};
let packDone = {};

function buildSchedule(){
  const c = document.getElementById('days-container');
  c.innerHTML = '';
  DAYS.forEach((day,di)=>{
    const d = document.createElement('div');
    d.className='day-block';
    d.innerHTML=`<div class="day-label">${day.label}</div>`;
    const slots = day.slots.map((s,si)=>`
      <div class="timeline-item">
        <div class="time-col">${s.t}</div>
        <div class="timeline-card">
          <input placeholder="${s.p||'予定を入力'}" value="${s.p}">
          <div class="memo"><input placeholder="メモ（お店名・住所など）"></div>
        </div>
      </div>`).join('');
    d.innerHTML += slots;
    d.innerHTML += `<button class="add-btn" onclick="addSlot(${di})"><i class="ti ti-plus" aria-hidden="true"></i>予定を追加</button>`;
    c.appendChild(d);
  });
}

function addSlot(di){
  DAYS[di].slots.push({t:"",p:""});
  buildSchedule();
}

function buildCatTabs(){
  const c = document.getElementById('cat-tabs');
  c.innerHTML = CATS.map(cat=>`<button class="cat-btn${cat===currentCat?' active':''}" onclick="switchCat('${cat}')">${cat}</button>`).join('');
}

function switchCat(cat){
  currentCat=cat;
  buildCatTabs();
  buildWishGrid();
}

function buildWishGrid(){
  const g = document.getElementById('wish-grid');
  const items = wishes[currentCat];
  g.innerHTML = items.map((w,i)=>`
    <div class="wish-card" id="wc-${i}">
      ${w.img?`<img src="${w.img}" style="width:100%;height:110px;object-fit:cover">`:
        `<div class="wish-img-placeholder" onclick="pickImg(${i})"><i class="ti ti-camera" aria-hidden="true"></i></div>`}
      <button class="wish-check${w.done?' done':''}" onclick="toggleWish(${i})" aria-label="購入済みにする">
        ${w.done?'<i class="ti ti-check" aria-hidden="true" style="font-size:12px;color:#fff"></i>':''}
      </button>
      <button class="wish-delete" onclick="deleteWish(${i})" aria-label="削除"><i class="ti ti-x" aria-hidden="true"></i></button>
      <div class="wish-body">
        <input class="wish-name" placeholder="商品名" value="${w.name||''}">
        <input class="wish-price" placeholder="予算 (例: ₩15,000)" value="${w.price||''}">
      </div>
    </div>`).join('') +
    `<div class="add-wish-btn" onclick="addWish()"><i class="ti ti-plus" aria-hidden="true"></i><span>追加</span></div>`;
}

function addWish(){
  wishes[currentCat].push({name:'',price:'',img:'',done:false});
  buildWishGrid();
  setTimeout(()=>{
    const inputs = document.querySelectorAll('.wish-name');
    if(inputs.length) inputs[inputs.length-1].focus();
  },50);
}

function deleteWish(i){
  wishes[currentCat].splice(i,1);
  buildWishGrid();
}

function toggleWish(i){
  wishes[currentCat][i].done = !wishes[currentCat][i].done;
  buildWishGrid();
}

function pickImg(i){
  pendingWishCat = currentCat;
  const inp = document.getElementById('img-input');
  inp._idx = i;
  inp.click();
}

document.getElementById('img-input').addEventListener('change',function(){
  const f = this.files[0];
  if(!f) return;
  const r = new FileReader();
  r.onload = e => {
    wishes[pendingWishCat][this._idx].img = e.target.result;
    buildWishGrid();
  };
  r.readAsDataURL(f);
  this.value='';
});

function buildShops(){
  const c = document.getElementById('shops-list');
  c.innerHTML = shops.map((s,i)=>`
    <div class="shop-card">
      <div class="shop-icon"><i class="ti ti-map-pin" aria-hidden="true"></i></div>
      <div class="shop-info">
        <input value="${s.name}" placeholder="お店・スポット名">
        <input class="sub" value="${s.memo}" placeholder="エリア・メモ">
      </div>
      <button class="shop-done${s.done?' done':''}" onclick="toggleShop(${i})" aria-label="訪問済みにする">
        ${s.done?'<i class="ti ti-check" aria-hidden="true" style="font-size:14px"></i>':''}
      </button>
    </div>`).join('');
}

function addShop(){
  shops.push({name:'',memo:'',done:false});
  buildShops();
  setTimeout(()=>{
    const inputs = document.querySelectorAll('.shop-info input');
    if(inputs.length) inputs[inputs.length-2].focus();
  },50);
}

function toggleShop(i){
  shops[i].done = !shops[i].done;
  buildShops();
}

function buildPack(){
  const c = document.getElementById('pack-list');
  c.innerHTML = Object.entries(PACK).map(([cat,items])=>`
    <div class="check-section">
      <div class="check-label">${cat}</div>
      ${items.map((item,i)=>{
        const key = cat+item;
        const done = !!packDone[key];
        return `<div class="check-item">
          <button class="checkbox${done?' done':''}" onclick="togglePack('${key}')" aria-label="${item}をチェック">
            ${done?'<i class="ti ti-check" aria-hidden="true" style="font-size:12px;color:#fff"></i>':''}
          </button>
          <span class="check-text${done?' done':''}">${item}</span>
        </div>`;
      }).join('')}
    </div>`).join('');
}

function togglePack(key){
  packDone[key] = !packDone[key];
  buildPack();
}

function switchTab(name, btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
}

buildSchedule();
buildCatTabs();
buildWishGrid();
buildShops();
buildPack();
</script>
